version: '3.8'

services:
  front-end:
    image: suryaa112003/duniversity:v1.1.0
    container_name: frontend-cont 
    ports:
      - "82:3000"
    env_file:
      - .env
    networks:
      - university-network
  
  backend-cont:
    image: mysql
    container_name: mariadb
    ports:
      - "3306:3306"
    networks:
      - university-network
    volumes:
      - university-volume:/data/db
    env_file:
      - .env

volumes:
  university-volume:
networks:
  university-network:

  
